<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260" viewBox="0 0 900 260" role="img" aria-labelledby="title desc">
  <title id="title">StudyFlashCards Logo</title>
  <desc id="desc">Simple logo with stacked cards icon and StudyFlashCards text</desc>
  <rect width="900" height="260" rx="20" fill="#BBC5A9"/>
  <g transform="translate(60,40)">
    <rect x="0" y="20" width="150" height="110" rx="10" fill="#7BAACC"/>
    <rect x="18" y="0" width="150" height="110" rx="10" fill="#D39B8A"/>
    <rect x="36" y="-20" width="150" height="110" rx="10" fill="#B36B8E"/>
    <line x1="60" y1="20" x2="160" y2="20" stroke="#BBC5A9" stroke-width="7"/>
    <line x1="60" y1="45" x2="130" y2="45" stroke="#BBC5A9" stroke-width="7"/>
  </g>
  <text x="280" y="115" fill="#B36B8E" font-family="Poppins, Arial, sans-serif" font-size="64" font-weight="700">StudyFlashCards</text>
  <text x="282" y="165" fill="#1F1F1F" font-family="Nunito Sans, Arial, sans-serif" font-size="32">Easy study, smarter learning</text>
</svg>
