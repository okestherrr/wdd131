<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Study page wireframe</title>
  <desc id="desc">Wireframe for StudyStack flash card study page</desc>
  <rect width="1200" height="760" fill="#ffffff" stroke="#333"/>
  <rect x="40" y="30" width="1120" height="80" fill="#e6e6e6" stroke="#666"/>
  <g transform="translate(50,35)">
    <rect x="0" y="12" width="45" height="33" rx="3" fill="#7BAACC" stroke="#333" stroke-width="1"/>
    <rect x="5" y="8" width="45" height="33" rx="3" fill="#D39B8A" stroke="#333" stroke-width="1"/>
    <rect x="10" y="4" width="45" height="33" rx="3" fill="#B36B8E" stroke="#333" stroke-width="1"/>
  </g>
  <text x="115" y="78" font-family="Arial" font-size="28" fill="#222" font-weight="bold">StudyFlashCards</text>
  <rect x="820" y="48" width="320" height="42" fill="#f5f5f5" stroke="#777"/>
  <text x="845" y="76" font-family="Arial" font-size="20" fill="#222">Home | Study | Progress</text>

  <rect x="220" y="160" width="760" height="330" fill="#f9f9f9" stroke="#666"/>
  <text x="260" y="215" font-family="Arial" font-size="28" fill="#222">Flash Card</text>
  <rect x="300" y="250" width="600" height="170" fill="#ffffff" stroke="#666"/>
  <text x="340" y="345" font-family="Arial" font-size="34" fill="#222">Question / Answer</text>

  <rect x="220" y="530" width="130" height="55" fill="#d9d9d9" stroke="#666"/>
  <text x="245" y="565" font-family="Arial" font-size="22" fill="#222">Prev</text>

  <rect x="380" y="530" width="130" height="55" fill="#d9d9d9" stroke="#666"/>
  <text x="400" y="565" font-family="Arial" font-size="22" fill="#222">Next</text>

  <rect x="550" y="530" width="170" height="55" fill="#d9d9d9" stroke="#666"/>
  <text x="580" y="565" font-family="Arial" font-size="22" fill="#222">Shuffle</text>

  <rect x="760" y="530" width="190" height="55" fill="#d9d9d9" stroke="#666"/>
  <text x="790" y="565" font-family="Arial" font-size="22" fill="#222">Mark Known</text>

  <text x="220" y="640" font-family="Arial" font-size="24" fill="#222">Progress: Card 4 of 20 | Known 2 | Review 2</text>
