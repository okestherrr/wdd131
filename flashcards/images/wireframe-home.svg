<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Home page wireframe</title>
  <desc id="desc">Wireframe for StudyStack home page</desc>
  <rect width="1200" height="760" fill="#ffffff" stroke="#333"/>
  <rect x="40" y="30" width="1120" height="80" fill="#e6e6e6" stroke="#666"/>
  <g transform="translate(50,35)">
    <rect x="0" y="12" width="45" height="33" rx="3" fill="#7BAACC" stroke="#333" stroke-width="1"/>
    <rect x="5" y="8" width="45" height="33" rx="3" fill="#D39B8A" stroke="#333" stroke-width="1"/>
    <rect x="10" y="4" width="45" height="33" rx="3" fill="#B36B8E" stroke="#333" stroke-width="1"/>
  </g>
  <text x="115" y="78" font-family="Arial" font-size="28" fill="#222" font-weight="bold">StudyFlashCards</text>
  <rect x="820" y="48" width="320" height="42" fill="#f5f5f5" stroke="#777"/>
  <text x="845" y="76" font-family="Arial" font-size="20" fill="#222">Home | Study | Progress</text>

  <rect x="120" y="160" width="960" height="210" fill="#f9f9f9" stroke="#666"/>
  <text x="160" y="225" font-family="Arial" font-size="36" fill="#222">Hero: Study Smarter with Flash Cards</text>
  <rect x="160" y="260" width="260" height="60" fill="#d9d9d9" stroke="#666"/>
  <text x="200" y="298" font-family="Arial" font-size="24" fill="#222">Start Studying</text>

  <rect x="120" y="410" width="450" height="250" fill="#f9f9f9" stroke="#666"/>
  <text x="150" y="455" font-family="Arial" font-size="26" fill="#222">How It Works</text>
  <text x="150" y="495" font-family="Arial" font-size="20" fill="#333">1. Pick a deck</text>
  <text x="150" y="528" font-family="Arial" font-size="20" fill="#333">2. Flip each card</text>
  <text x="150" y="561" font-family="Arial" font-size="20" fill="#333">3. Track progress</text>

  <rect x="610" y="410" width="470" height="250" fill="#f9f9f9" stroke="#666"/>
  <text x="640" y="455" font-family="Arial" font-size="26" fill="#222">Quick Stats Preview</text>
  <text x="640" y="495" font-family="Arial" font-size="20" fill="#333">Total Cards: 20</text>
  <text x="640" y="528" font-family="Arial" font-size="20" fill="#333">Known: 12</text>
  <text x="640" y="561" font-family="Arial" font-size="20" fill="#333">Needs Review: 8</text>
</svg>
